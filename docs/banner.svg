<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="AL.AI — Unlimited Free Serverless AI Chat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" rx="19" fill="none" stroke="#30363d"/>
  <circle cx="70" cy="70" r="10" fill="#3fb950" filter="url(#glow)"/>
  <text x="96" y="78" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#8b949e">chat.alouatiq.com</text>
  <text x="60" y="182" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="800" font-size="96" fill="#e6edf3">AL<tspan fill="url(#accent)">.AI</tspan></text>
  <text x="66" y="228" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" fill="#8b949e">Unlimited · Free · Serverless AI Chat</text>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#c9d1d9">
    <rect x="62"  y="258" width="196" height="38" rx="19" fill="#21262d" stroke="#30363d"/><text x="82"  y="283">🔌 Multi-provider</text>
    <rect x="270" y="258" width="176" height="38" rx="19" fill="#21262d" stroke="#30363d"/><text x="290" y="283">🖥 On-device</text>
    <rect x="458" y="258" width="150" height="38" rx="19" fill="#21262d" stroke="#30363d"/><text x="478" y="283">🎨 Images</text>
    <rect x="620" y="258" width="208" height="38" rx="19" fill="#21262d" stroke="#30363d"/><text x="640" y="283">💾 Browser-only history</text>
  </g>
  <g transform="translate(980,90)" opacity="0.95">
    <rect x="0" y="0" width="170" height="150" rx="14" fill="#21262d" stroke="#30363d"/>
    <rect x="16" y="20" width="120" height="14" rx="7" fill="#30363d"/>
    <rect x="16" y="46" width="138" height="14" rx="7" fill="#30363d"/>
    <rect x="16" y="72" width="96"  height="14" rx="7" fill="url(#accent)"/>
    <rect x="16" y="104" width="138" height="30" rx="8" fill="#0d1117" stroke="#30363d"/>
    <circle cx="142" cy="119" r="9" fill="url(#accent)"/>
  </g>
